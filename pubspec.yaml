name: pg_manager_owner
description: "PG Manager - Owner App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network (prepped for NestJS backend)
  dio: ^5.9.0

  # Dependency Injection
  get_it: ^8.0.3
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  share_plus: 13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
